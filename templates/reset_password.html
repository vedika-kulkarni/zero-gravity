{% extends "base.html" %}
{% block title %}Reset Password | Zero Gravity{% endblock %}
{% block content %}

<div style="background:var(--zg-deep);padding:5rem 0 3rem;">
  <div class="container">
    <div class="section-label" style="color:var(--zg-gold);">Account Recovery</div>
    <h1 class="hero-title" style="font-size:clamp(2rem,5vw,3rem);">Reset Password</h1>
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div style="background:#fff;border:1px solid var(--zg-border);border-radius:16px;padding:2.5rem;">
          <h3 style="font-family:var(--ff-head);font-size:1.4rem;margin-bottom:0.5rem;">Create new password</h3>
          <p style="color:var(--zg-gray);font-size:0.88rem;margin-bottom:2rem;">Enter the 6-digit verification code sent to your email and choose a new password.</p>

          <form method="POST" action="{{ url_for('reset_password') }}">
            <div class="mb-3">
              <label class="form-label">Email Address *</label>
              <input type="email" class="form-control" name="email" value="{{ email }}" readonly style="background:#f8f9fa;">
            </div>
            <div class="mb-3">
              <label class="form-label">Verification Code *</label>
              <input type="text" class="form-control" name="code" required placeholder="123456" autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label">New Password *</label>
              <input type="password" class="form-control" name="password" required placeholder="At least 6 characters">
            </div>
            <div class="mb-4">
              <label class="form-label">Confirm New Password *</label>
              <input type="password" class="form-control" name="confirm_password" required placeholder="Repeat new password">
            </div>
            <button type="submit" class="btn-submit-form">
              <i class="fas fa-key me-2"></i>Reset Password
            </button>
            <p style="text-align:center;margin-top:1.25rem;font-size:0.85rem;color:var(--zg-gray);">
              Back to <a href="{{ url_for('login') }}" style="color:var(--zg-accent);font-weight:600;">Login</a>
            </p>
          </form>

        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
